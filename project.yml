name: OneVoice
options:
  bundleIdPrefix: studio.oneapps
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "26.0"

settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: PCJ84YD7HQ
    MARKETING_VERSION: 1.0.0
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0
    EXTRACT_APP_INTENTS_METADATA: NO

packages:
  OneVoiceKit:
    path: Packages/OneVoiceKit

targets:
  OneVoice:
    type: application
    platform: iOS
    sources:
      - path: IOSAPP/OneVoice
        excludes:
          - Data
          - Features/Checklist
          - Features/Home
          - Features/Pro
          - Features/Settings
          - Features/WhatsNew
          - OneKit
          - Configuration
          - OneVoice.storekit
          - Core
      - path: IOSAPP/OneVoice/Core/AppAppearance.swift
      - path: IOSAPP/OneVoice/Core/AppLanguage.swift
      - path: IOSAPP/OneVoice/Core/AppStorageKeys.swift
      - path: IOSAPP/OneVoice/Features/Settings/SettingsView.swift
      - path: IOSAPP/OneVoice/Features/Settings/SettingsLanguageView.swift
      - path: IOSAPP/OneVoice/Features/Settings/SettingsThemeAppearanceView.swift
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: IOSAPP/Config/OneVoice-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice
        PRODUCT_NAME: OneVoice
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: IOSAPP/Config/OneVoice.entitlements
    dependencies:
      - package: OneVoiceKit
        product: OneVoiceCore
      - package: OneVoiceKit
        product: OneVoiceAppleSpeech
      - package: OneVoiceKit
        product: OneVoiceQwenSpeech

  OneVoiceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/OneVoiceTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.tests
    dependencies:
      - target: OneVoice

  OneVoiceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/OneVoiceUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.uitests
        TEST_TARGET_NAME: OneVoice
    dependencies:
      - target: OneVoice

  OneVoiceMac:
    type: application
    platform: macOS
    sources:
      - path: MACAPP/OneVoiceMac
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MACAPP/Config/OneVoiceMac-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.mac
        PRODUCT_MODULE_NAME: OneVoiceMac
        PRODUCT_NAME: OneVoice
    entitlements:
      path: MACAPP/Config/OneVoiceMac.entitlements
      properties:
        com.apple.security.device.audio-input: true
    dependencies:
      - package: OneVoiceKit
        product: OneVoiceCore
      - package: OneVoiceKit
        product: OneVoiceAppleSpeech
      - package: OneVoiceKit
        product: OneVoiceQwenSpeech

  OneVoiceMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/OneVoiceMacTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.mac.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OneVoice.app/Contents/MacOS/OneVoice"
    dependencies:
      - target: OneVoiceMac

schemes:
  OneVoice:
    build:
      targets:
        OneVoice: all
        OneVoiceTests: [test]
        OneVoiceUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - OneVoiceTests
        - OneVoiceUITests

  OneVoiceMac:
    build:
      targets:
        OneVoiceMac: all
        OneVoiceMacTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - OneVoiceMacTests
