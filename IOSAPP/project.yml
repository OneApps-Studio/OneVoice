name: OneVoice
options:
  bundleIdPrefix: studio.oneapps
  createIntermediateGroups: true
  developmentLanguage: en
  knownRegions:
    - en
    - Base
    - zh-Hans
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "26.0"

settings:
  base:
    APS_ENVIRONMENT: development
    CURRENT_PROJECT_VERSION: 4
    DEVELOPMENT_TEAM: PCJ84YD7HQ
    MARKETING_VERSION: 1.2.0
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0
    EXTRACT_APP_INTENTS_METADATA: NO
  configs:
    Release:
      APS_ENVIRONMENT: production

packages:
  OneAppsKit:
    path: ../../../Packages/OneAppsKit
  OneVoiceKit:
    path: ../Packages/OneVoiceKit

targets:
  OneVoice:
    type: application
    platform: iOS
    sources:
      - path: OneVoice
        excludes:
          - Data
          - Features/Checklist
          - Features/Home
          - Features/Pro
          - Features/WhatsNew
          - OneKit
          - Configuration
          - OneVoice.storekit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/OneVoice-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice
        PRODUCT_MODULE_NAME: OneVoice
        PRODUCT_NAME: OneVoice
        ONEVOICE_CLOUD_CONTAINER_IDENTIFIER: iCloud.studio.oneapps.onevoice
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Config/OneVoice-Dev.entitlements
          PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.dev
          PRODUCT_NAME: OneVoice Dev
        Release:
          CODE_SIGN_ENTITLEMENTS: Config/OneVoice.entitlements
          PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice
          PRODUCT_NAME: OneVoice
    dependencies:
      - package: OneVoiceKit
        product: OneVoiceCore
      - package: OneVoiceKit
        product: OneVoiceAppleSpeech
      - package: OneVoiceKit
        product: OneVoiceCloudSync
      - package: OneVoiceKit
        product: OneVoiceQwenSpeech
      - package: OneAppsKit
        product: OneAppsShell

  OneVoiceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../Tests/OneVoiceTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.tests
      configs:
        Debug:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OneVoice Dev.app/OneVoice Dev"
        Release:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OneVoice.app/OneVoice"
    dependencies:
      - target: OneVoice

  OneVoiceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ../Tests/OneVoiceUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.uitests
        TEST_TARGET_NAME: OneVoice
    dependencies:
      - target: OneVoice

  OneVoiceMac:
    type: application
    platform: macOS
    sources:
      - path: ../MACAPP/OneVoiceMac
    settings:
      base:
        ARCHS: arm64
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ../MACAPP/Config/OneVoiceMac-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.mac
        PRODUCT_MODULE_NAME: OneVoiceMac
        PRODUCT_NAME: OneVoice
        ONEVOICE_CLOUD_CONTAINER_IDENTIFIER: iCloud.studio.oneapps.onevoice
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ../MACAPP/Config/OneVoiceMac-Dev.entitlements
          PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.mac.dev
          PRODUCT_NAME: OneVoice Dev
        Release:
          CODE_SIGN_ENTITLEMENTS: ../MACAPP/Config/OneVoiceMac.entitlements
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    dependencies:
      - package: OneVoiceKit
        product: OneVoiceCore
      - package: OneVoiceKit
        product: OneVoiceAppleSpeech
      - package: OneVoiceKit
        product: OneVoiceCloudSync
      - package: OneVoiceKit
        product: OneVoiceQwenSpeech
      - package: OneAppsKit
        product: OneAppsShell

  OneVoiceMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ../Tests/OneVoiceMacTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.mac.tests
      configs:
        Debug:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OneVoice Dev.app/Contents/MacOS/OneVoice Dev"
        Release:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OneVoice.app/Contents/MacOS/OneVoice"
    dependencies:
      - target: OneVoiceMac

  OneVoiceMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ../Tests/OneVoiceMacUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: studio.oneapps.onevoice.mac.uitests
        TEST_TARGET_NAME: OneVoiceMac
    dependencies:
      - target: OneVoiceMac

schemes:
  OneVoice:
    build:
      targets:
        OneVoice: all
        OneVoiceTests: [test]
        OneVoiceUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - OneVoiceTests
        - OneVoiceUITests

  OneVoiceMac:
    build:
      targets:
        OneVoiceMac: all
        OneVoiceMacTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - OneVoiceMacTests
        - OneVoiceMacUITests
